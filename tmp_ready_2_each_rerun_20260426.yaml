paths:
  ready_root: /root/.openclaw/workspace/ready_2_each/ready
  output_root: /root/.openclaw/workspace/agent-pipeline/pipeline2/outputs_ready_2_each_rerun_20260426
  checkpoint_db_path: /root/.openclaw/workspace/agent-pipeline/pipeline2/runtime/pipeline_langgraph_ready_2_each_rerun_20260426.sqlite

runtime:
  include_manual_review: true
  max_problems: 0
  max_problem_workers: 1
  max_images_per_problem: 3
  save_runtime_snapshots: true
  save_problem_bundles: true
  enable_trace_patch_writes: true
  log_level: INFO
  log_to_file: true

thresholds:
  method_score_thresholds: [0.33, 0.67]
  novelty_total_threshold: 0.55
  novelty_required_threshold: 0.50

models:
  primary:
    name: primary
    base_url: ${ANNOTATION_API_BASE_URL}
    api_key: ${ANNOTATION_API_KEY}
    model: ${ANNOTATION_MODEL}
    reasoning_effort: ${ANNOTATION_REASONING_EFFORT}
    temperature: 0.1
    timeout_seconds: 180
    enabled: true
    api_mode: ${ANNOTATION_API_MODE}
    max_attempts: 5
    retry_base_delay_seconds: 5
    retry_max_delay_seconds: 60
    respect_retry_after: true
  fallback:
    name: fallback
    base_url: ${ANNOTATION_FALLBACK_BASE_URL}
    api_key: ${ANNOTATION_FALLBACK_API_KEY}
    model: ${ANNOTATION_MODEL}
    reasoning_effort: ${ANNOTATION_REASONING_EFFORT}
    temperature: 0.1
    timeout_seconds: 180
    enabled: false
    api_mode: ${ANNOTATION_FALLBACK_API_MODE}
    max_attempts: 5
    retry_base_delay_seconds: 5
    retry_max_delay_seconds: 60
    respect_retry_after: true
