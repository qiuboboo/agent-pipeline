paths:
  ready_root: ready
  output_root: pipeline2/verified_cot_outputs
  checkpoint_db_path: pipeline2/runtime/verified_cot_langgraph.sqlite

runtime:
  include_manual_review: false
  max_problems: 0
  max_problem_workers: 4
  max_images_per_problem: 3
  save_runtime_snapshots: false
  save_problem_bundles: true
  enable_trace_patch_writes: false

thresholds:
  method_score_thresholds: [0.33, 0.67]
  novelty_total_threshold: 0.55
  novelty_required_threshold: 0.50

models:
  primary:
    name: primary
    base_url: https://synai996.space/v1
    api_key: ${PIPELINE2_API_KEY_PRIMARY}
    model: gpt-5.4
    reasoning_effort: high
    temperature: 0.1
    timeout_seconds: 180
    enabled: true
  fallback:
    name: fallback
    base_url: http://9854399.xyz:8888/v1
    api_key: ${PIPELINE2_API_KEY_FALLBACK}
    model: gpt-5.4
    reasoning_effort: high
    temperature: 0.1
    timeout_seconds: 180
    enabled: true
