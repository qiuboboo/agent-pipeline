model_provider: OpenAI
model: gpt-5.4
review_model: gpt-5.4
model_reasoning_effort: high
disable_response_storage: true
network_access: enabled
windows_wsl_setup_acknowledged: true
model_context_window: 1000000
model_auto_compact_token_limit: 900000
model_providers:
  OpenAI:
    name: OpenAI
    base_url: https://www.msutools.cn
    wire_api: responses
    requires_openai_auth: true
paths:
  ready_root: ready
  output_root: pipeline2/outputs
  checkpoint_db_path: pipeline2/runtime/pipeline_langgraph.sqlite
runtime:
  include_manual_review: false
  max_problems: 0
  max_problem_workers: 4
  max_images_per_problem: 3
  save_runtime_snapshots: false
  save_problem_bundles: true
  enable_trace_patch_writes: true
  enable_problem_structure_validation: true
  fail_on_problem_structure_validation: true
  stage_retry_attempts: 3
  stage_retry_backoff_seconds: 1.0
  problem_retry_attempts: 10
  continue_on_problem_error: true
thresholds:
  method_score_thresholds:
  - 0.33
  - 0.67
  novelty_total_threshold: 0.55
  novelty_required_threshold: 0.5
models:
  primary:
    name: primary
    provider: OpenAI
    base_url: https://www.msutools.cn
    api_key: ${OPENAI_API_KEY}
    model: gpt-5.4
    reasoning_effort: high
    wire_api: responses
    requires_openai_auth: true
    disable_response_storage: true
    temperature: 0.1
    timeout_seconds: 180
    enabled: true
