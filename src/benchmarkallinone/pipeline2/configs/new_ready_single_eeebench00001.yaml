paths:
  ready_root: /root/.openclaw/workspace/tmp_pipeline2_new_ready_single/ready
  output_root: /root/.openclaw/workspace/agent-pipeline/pipeline2/outputs_new_ready_single
  checkpoint_db_path: /root/.openclaw/workspace/agent-pipeline/pipeline2/runtime/pipeline_langgraph_new_ready_single.sqlite
runtime:
  include_manual_review: false
  max_problems: 1
  max_problem_workers: 1
  max_images_per_problem: 3
  save_runtime_snapshots: true
  save_problem_bundles: true
  enable_trace_patch_writes: false
thresholds:
  method_score_thresholds:
  - 0.33
  - 0.67
  novelty_total_threshold: 0.55
  novelty_required_threshold: 0.5
models:
  primary:
    name: primary
    base_url: ${ANNOTATION_API_BASE_URL}
    api_key: ${ANNOTATION_API_KEY}
    model: ${ANNOTATION_MODEL}
    reasoning_effort: ${ANNOTATION_REASONING_EFFORT}
    temperature: 0.1
    timeout_seconds: 180
    enabled: true
    wire_api: ${ANNOTATION_API_MODE}
