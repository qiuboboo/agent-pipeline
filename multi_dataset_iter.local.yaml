runtime:
  sample_per_dataset: 10
  sample_strategy: head
  shuffle_seed: 42
  output_root: outputs/multidataset_cleaning_iter
  cleaning_version: v2.0.1-prompt-extract
  batch_id_prefix: multidataset-clean
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  api_key: ${OPENAI_API_KEY}
  model: gpt-5.4
  reasoning_effort: xhigh
  temperature: 0.1
  timeout_seconds: 180
  enabled: true

thresholds:
  min_width: 256
  min_height: 256
  min_sharpness_score: 0.22
  min_readability_score: 0.35
  min_contrast_score: 18.0
  reject_clean_score_below: 0.45
  review_clean_score_below: 0.62
  min_text_completeness_score: 0.60
  min_alignment_consistency: 0.55

datasets:
  - key: m3cot_mini
    display_name: M3CoT-mini
    subject: multimodal
    note: Local mini test for prompt-based extraction inside reference pipeline
    source_kind: local_file
    source_locator: /root/.openclaw/workspace/agent-pipeline/m3cot/mini_test/test.json
    split: test
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [image, images, image_path, img_path, figure]
    choice_fields: [choices, options]
    force_requires_image: true
  - key: mm_math_local
    display_name: MM-Math-local
    subject: math
    note: Local downloaded HF candidate jsonl
    source_kind: local_file
    source_locator: /root/.openclaw/workspace/benchmark_samples/HF_candidates/MM_Math/MM_Math/MM_Math.jsonl
    split: train
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [image, images, image_path, img_path, figure, file_name]
    choice_fields: [choices, options]
    force_requires_image: true
