runtime:
  sample_per_dataset: 1
  sample_strategy: head
  shuffle_seed: 42
  output_root: benchmarkallinone/outputs/local_file_smoke
  cleaning_version: v3.1.0
  batch_id_prefix: benchmarkallinone-local
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  enabled: false
  base_url: https://synai996.space/v1
  model: gpt-5.4
  reasoning_effort: xhigh
  temperature: 0.1
  timeout_seconds: 180
  agent_only_extraction: false

thresholds:
  min_width: 256
  min_height: 256
  min_sharpness_score: 0.22
  min_readability_score: 0.35
  min_contrast_score: 18.0
  reject_clean_score_below: 0.45
  review_clean_score_below: 0.62
  min_text_completeness_score: 0.60
  min_alignment_consistency: 0.55

datasets:
  - key: tmp_local
    display_name: Tmp-Local
    subject: math
    note: temp smoke test
    source_kind: local_file
    source_locator: "C:/Users/HP/Desktop/Hallucination/workspace/agent-pipeline/tmpki60dkss.json"
    split: local
    question_fields: [question]
    answer_fields: [answer]
    image_fields: [image]
    choice_fields: [choices, options]
