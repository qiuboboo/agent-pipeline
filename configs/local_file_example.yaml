runtime:
  sample_per_dataset: 20
  sample_strategy: head
  shuffle_seed: 42
  output_root: benchmarkallinone/outputs/local_file_smoke
  cleaning_version: v3.1.0
  batch_id_prefix: benchmarkallinone-local
  save_sample_bundle: true
  git_cache_root: benchmarkallinone/outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  api_key: ${OPENAI_API_KEY}
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true



datasets:
  - key: local_scemqa_free_response
    display_name: Local-SCEMQA-FreeResponse
    subject: 数学、物理、生物、化学
    note: 本地 JSON 示例配置，可直接替换成你自己的数据文件
    source_kind: local_file
    source_locator: benchmark/outputs/repo_cache/scemqa/Free_Response/free_response.json
    split: local
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [image, image_path, img_path, diagram]
    choice_fields: [choices, options]
