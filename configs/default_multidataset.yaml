runtime:
  sample_per_dataset: 30
  sample_strategy: head
  shuffle_seed: 42
  output_root: outputs/multidataset_cleaning
  cleaning_version: v3.1.0
  batch_id_prefix: benchmarkallinone-clean
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  api_key: ${OPENAI_API_KEY}
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true


