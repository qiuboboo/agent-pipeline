runtime:
  sample_per_dataset: 1
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: outputs/agent_validation_geoqa_plus_only
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-agent-validation-geoqa-plus-only
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://cf.cuylerchen.uk/openai/v1
  api_key: ${OPENAI_API_KEY}
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
  - key: geoqa_plus
    display_name: GeoQA-Plus
    subject: 几何
    note: 使用 Hugging Face 数据源进行初筛；单数据集小样本验证。
    source_kind: huggingface
    source_locator: Yuting6/geoqa_plus-augmentation
    split: validation
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [decoded_image, image, image_path, img_path, diagram]
    choice_fields: [options, choices]
    force_requires_image: true
    answer_index_base: 0
