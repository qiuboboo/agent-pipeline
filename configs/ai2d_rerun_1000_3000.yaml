runtime:
  sample_per_dataset: 2000
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 5
  output_root: outputs/ai2d_1000_3000
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-ai2d-1000-3000
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://www.msutools.cn/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
  - key: ai2d
    display_name: AI2D
    subject: science_diagram_understanding
    note: "rerun split test[1000:3000] after split audit"
    source_kind: huggingface
    source_locator: lmms-lab/ai2d
    split: test[1000:3000]
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [decoded_image, image, image_path, img_path, diagram]
    choice_fields: [options, choices]
    force_requires_image: true
    answer_index_base: 0
    answer_resolution_mode: region_label_index
