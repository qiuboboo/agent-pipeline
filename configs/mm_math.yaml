runtime:
  sample_per_dataset: 300
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: outputs/mm_math_000_300
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-mm-math-000-300
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://cf.cuylerchen.uk/openai/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
- key: mm_math
  display_name: MM-Math
  subject: 数学
  note: MM-Math 0~300
  source_kind: huggingface
  source_locator: THU-KEG/MM_Math
  split: train[0:300]