runtime:
  sample_per_dataset: 300
  sample_strategy: head
  shuffle_seed: 42
  output_root: outputs/mathvision_300
  cleaning_version: v3.1.0
  batch_id_prefix: benchmarkallinone-mathvision300
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://cf.cuylerchen.uk/openai/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
  - key: mathvision
    display_name: MathVision
    subject: 数学
    note: Hugging Face 数据集
    source_kind: huggingface
    source_locator: MathLLMs/MathVision
    split: test[0:300]
    question_fields: [question]
    answer_fields: [answer, solution]
    image_fields: [decoded_image, image]
    choice_fields: [options, choices]
