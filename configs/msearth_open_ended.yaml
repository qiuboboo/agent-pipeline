runtime:
  sample_per_dataset: 300
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: outputs/msearth_open_ended_300_600
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-msearth-open-ended-300-600
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://cf.cuylerchen.uk/openai/v1
  api_key: ""
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
  - key: msearth_open_ended
    display_name: MSEarth Open Ended
    subject: 地球科学
    note: 使用 Hugging Face 数据源，并传递 reasoning chain
    source_kind: huggingface
    source_locator: MSEarth/MSEarth_Open_Ended
    split: train[300:600]
    question_fields: [query]
    answer_fields: [response]
    image_fields: [image]
    metadata_fields: [reasoning_chain, caption, title, classification_result, vqa_type]
