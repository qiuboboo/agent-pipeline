runtime:
  sample_per_dataset: 10
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: outputs/mm_math_validation_10_responses
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-mm-math-validation-10-responses
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://cf.cuylerchen.uk/openai/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
  - key: mm_math
    display_name: MM-Math
    subject: 数学
    note: MM-Math 10 条单数据集验证，使用 Hugging Face 原始文件 fallback 采样
    source_kind: huggingface
    source_locator: THU-KEG/MM_Math
    split: train
