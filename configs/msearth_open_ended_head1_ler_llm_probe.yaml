runtime:
  sample_per_dataset: 1
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: benchmarkallinone/outputs/msearth_open_ended_head1_ler_llm_probe
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-msearth-open-ended-head1-ler-llm-probe
  save_sample_bundle: true
  git_cache_root: benchmarkallinone/outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true

datasets:
  - key: msearth_open_ended
    display_name: MSEarth Open Ended
    subject: 地球科学
    note: ler 分支单样本 LLM 调用探针
    source_kind: huggingface
    source_locator: MSEarth/MSEarth_Open_Ended
    split: train
    question_fields: [query]
    answer_fields: [response]
    image_fields: [image]
    metadata_fields: [reasoning_chain, caption, title, classification_result, vqa_type]
