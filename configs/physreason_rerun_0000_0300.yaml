runtime:
  sample_per_dataset: 1200
  sample_offset: 0
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 5
  output_root: outputs/physreason_full_0000_1200
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-physreason-full-0000-1200
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache
  rerun_missing_only: true
  rerun_reference_output_globs:
    - physreason_full_*

model:
  base_url: https://www.msutools.cn/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses

datasets:
  - key: physreason
    display_name: PhysReason
    subject: physics
    note: "rerun missing source_problem_id items against prior physreason_full_* outputs"
    source_kind: huggingface
    source_locator: zhibei1204/PhysReason
    split: full
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    choice_fields: [choices, options]
