review_release:
  defaults:
    approved_via: user_confirmed_chat_policy
    adjacent_label: adjacent bucket

  datasets:
    mm_math:
      dataset_root: ready/mm_math/run_outputs_merged_by_source_problem_id__mm_math/datasets/mm_math
      policy_doc: docs/review/mm_math_A_release_decision_2026-04-10.md
      release_buckets:
        A:
          enabled: true
          candidate_key: strict_A_bucket_candidates
          release_basis: exact alignment-only review bucket
          pass_decision_reason_codes:
            - alignment_requires_review
            - manual_release_pass
          selection:
            match_mode: exact_set
            decision_reason_codes:
              - alignment_requires_review
          adjacent_observation:
            label: adjacent text_sufficient bucket
            candidate_key: adjacent_text_sufficient_candidates
            selection:
              match_mode: exact_set
              decision_reason_codes:
                - alignment_requires_review
                - text_sufficient

    mathvision:
      dataset_root: ready/mathvision/run_merged_mathvision_300_3040_dedup/datasets/mathvision
      policy_doc: ""
      release_buckets: {}

    eee_bench:
      dataset_root: ready/eee_bench/run_merged_eee_bench_1000_2860_dedup/datasets/eee_bench
      policy_doc: ""
      release_buckets: {}

    physreason:
