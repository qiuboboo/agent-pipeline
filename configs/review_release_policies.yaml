review_release:
  defaults:
    approved_via: user_confirmed_chat_policy
    adjacent_label: adjacent bucket

  datasets:
    mm_math:
      dataset_root: ready/mm_math/run_outputs_merged_by_source_problem_id__mm_math/datasets/mm_math
      policy_doc: docs/review/mm_math_A_release_decision_2026-04-10.md
      release_buckets:
        A:
          enabled: true
          candidate_key: strict_A_bucket_candidates
          release_basis: exact alignment-only review bucket
          pass_decision_reason_codes:
            - alignment_requires_review
            - manual_release_pass
          selection:
            match_mode: exact_set
            decision_reason_codes:
              - alignment_requires_review
          adjacent_observation:
            label: adjacent text_sufficient bucket
            candidate_key: adjacent_text_sufficient_candidates
            selection:
              match_mode: exact_set
              decision_reason_codes:
                - alignment_requires_review
                - text_sufficient

    mathvision:
      dataset_root: ready/mathvision/run_merged_mathvision_300_3040_dedup/datasets/mathvision
      policy_doc: ""
      release_buckets: {}

    eee_bench:
      dataset_root: ready/eee_bench/run_merged_eee_bench_1000_2860_dedup/datasets/eee_bench
      policy_doc: ""
      release_buckets: {}

    physreason:
      dataset_root: ready/physreason/run_merged_physreason_0000_0300/datasets/physreason
      policy_doc: docs/review/physreason_A_release_decision_2026-04-11.md
      release_buckets:
        A:
          enabled: true
          candidate_key: strict_A_bucket_candidates
          release_basis: exact alignment-only review bucket
          pass_decision_reason_codes:
            - alignment_requires_review
            - manual_release_pass
          selection:
            match_mode: exact_set
            decision_reason_codes:
              - alignment_requires_review
          adjacent_observation:
            label: adjacent metadata_inconsistency bucket
            candidate_key: adjacent_metadata_inconsistency_candidates
            selection:
              match_mode: exact_set
              decision_reason_codes:
                - alignment_requires_review
                - metadata_inconsistency

    emma_physics:
      dataset_root: ready/emma_physics/run_filtered_emma_physics_safe/datasets/emma_physics
      policy_doc: ""
      release_buckets: {}

    multi_physics:
      dataset_root: ready/multi_physics/run_outputs_merged_by_source_problem_id__multi_physics/datasets/multi_physics
      policy_doc: docs/review/multi_physics_A_release_decision_2026-04-11.md
      release_buckets:
        A:
          enabled: true
          candidate_key: strict_A_bucket_candidates
          release_basis: exact alignment+missing_grounded_visual_path review bucket
          pass_decision_reason_codes:
            - alignment_requires_review
            - missing_grounded_visual_path
            - manual_release_pass
          selection:
            match_mode: exact_set
            decision_reason_codes:
              - alignment_requires_review
              - missing_grounded_visual_path
          adjacent_observation:
            label: adjacent split_variant bucket
            candidate_key: adjacent_split_variant_candidates
            selection:
              match_mode: exact_set
              decision_reason_codes:
                - alignment_requires_review
                - missing_grounded_visual_path
                - split_variant_needs_review
        B1:
          enabled: true
          candidate_key: strict_B1_bucket_candidates
          policy_doc: docs/review/multi_physics_B1_release_decision_2026-04-11.md
          release_basis: exact alignment+missing_grounded_visual_path+split_variant_needs_review bucket with no quality_risk_flags
          pass_decision_reason_codes:
            - alignment_requires_review
            - missing_grounded_visual_path
            - split_variant_needs_review
            - manual_release_pass
          selection_notes: "explicit candidate-json subset: exact same reason-code set with quality_risk_flags == []"
          adjacent_observation:
            label: adjacent other-risk split_variant bucket
            candidate_key: adjacent_other_risk_split_variant_candidates
            selection_notes: "explicit candidate-json subset: same reason-code set but quality_risk_flags is non-empty"
        B2:
          enabled: true
          candidate_key: strict_B2_bucket_candidates
          policy_doc: docs/review/multi_physics_B2_release_decision_2026-04-11.md
          release_basis: exact alignment+missing_grounded_visual_path+split_variant_needs_review bucket with only low_resolution risk
          pass_decision_reason_codes:
            - alignment_requires_review
            - missing_grounded_visual_path
            - split_variant_needs_review
            - manual_release_pass
          selection_notes: "explicit candidate-json subset: exact same reason-code set with quality_risk_flags == [\"low_resolution\"]"
          adjacent_observation:
            label: adjacent other-risk split_variant bucket
            candidate_key: adjacent_other_risk_split_variant_candidates
            selection_notes: "explicit candidate-json subset: same reason-code set but quality_risk_flags != [\"low_resolution\"]"

    msearth_open_ended:
      dataset_root: ready/msearth_open_ended/run_merged_msearth_open_ended_0000_0120_ler_reasoning_chain/datasets/msearth_open_ended
      policy_doc: ""
      release_buckets: {}

    seephys:
      dataset_root: ready/seephys_000_300/datasets/seephys
      policy_doc: docs/review/seephys_A1_release_decision_2026-04-11.md
      release_buckets:
        A1:
          enabled: true
          candidate_key: A1_alignment_metadata_candidates
          release_basis: hand-curated alignment metadata/image-reference misfire subset
          pass_decision_reason_codes:
            - alignment_requires_review
            - manual_release_pass
          selection_notes: "explicit candidate-json subset from alignment_requires_review samples; do not treat as unified build-stage or exact-set policy"
          adjacent_observation:
            label: alignment borderline visual-semantics sample
            candidate_key: adjacent_alignment_borderline_candidates
