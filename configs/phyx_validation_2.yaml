runtime:
  sample_per_dataset: 2
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: benchmarkallinone/outputs/phyx_validation_2
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-phyx-validation-2
  save_sample_bundle: true
  git_cache_root: benchmarkallinone/outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  api_key: ""
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true

datasets:
  - key: phyx
    display_name: PhyX
    subject: 物理
    note: 使用专用 connector 对 PhyX 做 2 条验证试跑
    source_kind: huggingface
    source_locator: Cloudriver/PhyX
    hf_config_name: data_for_llms_eval
    split: phyx_mc
    question_fields: [question]
    answer_fields: [answer]
    image_fields: [image]
    choice_fields: [options]
    force_requires_image: true
