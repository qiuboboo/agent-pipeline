runtime:
  sample_per_dataset: 300
  sample_strategy: head
  shuffle_seed: 42
  output_root: outputs/eee_bench_300
  cleaning_version: v3.1.0
  batch_id_prefix: benchmarkallinone-eee-bench300
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true

datasets:
  - key: eee_bench
    display_name: EEE-Bench
    subject: 电气电子工程领域
    note: Hugging Face 数据集
    source_kind: huggingface
    source_locator: afdsafas/EEE-Bench
    split: test
    question_fields: [problem]
    answer_fields: [solution]
    image_fields: [image]
