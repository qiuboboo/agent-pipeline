runtime:
  sample_per_dataset: 100
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 2
  output_root: benchmarkallinone/outputs/agent_multidataset_validation_100
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-agent-multidataset-validation-100-resume-phyx
  save_sample_bundle: true
  git_cache_root: benchmarkallinone/outputs/repo_cache

model:
  base_url: http://9854399.xyz:8888/v1
  api_key: "sk-e6049d352cc1a8c0427cb1e945b67e59f73915223cb987deb0c95d1b9f33424b"
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true

datasets:
  - key: cmm_math
    display_name: CMM-Math
    subject: 数学
    note: 从中断位置继续进行 100 条 agent 采集与清洗验证
    source_kind: huggingface
    source_locator: ecnu-icalk/cmm-math
    split: train
    question_fields: [question]
    answer_fields: [answer, solution]
    image_fields: [decoded_image, image]
    choice_fields: [options, choices]

  - key: mathvision
    display_name: MathVision
    subject: 数学
    note: 从中断位置继续进行 100 条 agent 采集与清洗验证
    source_kind: huggingface
    source_locator: MathLLMs/MathVision
    split: test
    question_fields: [question]
    answer_fields: [answer, solution]
    image_fields: [decoded_image, image]
    choice_fields: [options, choices]

  - key: physreason
    display_name: PhysReason
    subject: 物理
    note: 从中断位置继续进行 100 条 agent 采集与清洗验证，并启用 raw zip fallback
    source_kind: huggingface
    source_locator: zhibei1204/PhysReason
    split: mini
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [image, decoded_image, image_path, img_path, figure]
    choice_fields: [choices, options]

  - key: phyx
    display_name: PhyX
    subject: 物理
    note: 在 100 条续跑中纳入 PhyX，使用专用 connector
    source_kind: huggingface
    source_locator: Cloudriver/PhyX
    hf_config_name: data_for_llms_eval
    split: phyx_mc
    question_fields: [question]
    answer_fields: [answer]
    image_fields: [image]
    choice_fields: [options]
    force_requires_image: true
