# Remote all-candidates smoke config.
# Purpose: connect every currently online-reachable confirmed candidate dataset
# with a very small sample size first, to validate remote programmatic intake.

runtime:
  sample_per_dataset: 2
  sample_strategy: head
  shuffle_seed: 42
  output_root: outputs/all_candidates_remote_smoke
  cleaning_version: v2.0.1-prompt-extract
  batch_id_prefix: all-candidates-remote
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache

model:
  base_url: https://synai996.space/v1
  api_key: ${OPENAI_API_KEY}
  model: gpt-5.4
  reasoning_effort: xhigh
  temperature: 0.1
  timeout_seconds: 180
  enabled: true

thresholds:
  min_width: 256
  min_height: 256
  min_sharpness_score: 0.22
  min_readability_score: 0.35
  min_contrast_score: 18.0
  reject_clean_score_below: 0.45
  review_clean_score_below: 0.62
  min_text_completeness_score: 0.60
  min_alignment_consistency: 0.55

datasets:
  - key: scemqa
    display_name: SCEMQA
    subject: science
    note: HF dataset
    source_kind: huggingface
    source_locator: pkulium/scemqa
    split: train
    question_fields: [question, problem, query, text]
    answer_fields: [answer, solution, label]
    image_fields: [decoded_image, image, image_path, img_path, diagram]
    choice_fields: [choices, options]
    force_requires_image: true

  - key: geometry3k
    display_name: Geometry3K
    subject: math
    note: GitHub source
    source_kind: github
    source_locator: https://github.com/lupantech/InterGPS
    split: test
    question_fields: [problem_text, compact_text, annotat_text, problem, question, text]
    answer_fields: [answer, solution, label]
    image_fields: [img_diagram, img_problem, diagram, image, img_path, image_path]
    choice_fields: [choices, compact_choices, options]
    force_requires_image: true

  - key: cmm_math
    display_name: CMM-Math
    subject: math
    note: HF dataset
    source_kind: huggingface
    source_locator: ecnu-icalk/cmm-math
