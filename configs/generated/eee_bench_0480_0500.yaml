runtime:
  sample_per_dataset: 20
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: outputs/eee_bench_batched_eval/0480_0500
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-eee-bench-0480-0500
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache
model:
  base_url: https://cf.cuylerchen.uk/openai/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
  api_mode: responses
  api_key: ${CUSTOM_OPENAI_API_KEY}
datasets:
- key: eee_bench
  display_name: EEE-Bench
  subject: 电气电子工程领域
  note: 分批运行区间 test[480:500]
  source_kind: huggingface
  source_locator: afdsafas/EEE-Bench
  split: test[480:500]
  question_fields:
  - problem
  answer_fields:
  - solution
  image_fields:
  - image
