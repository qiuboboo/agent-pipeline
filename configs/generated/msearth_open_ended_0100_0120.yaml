runtime:
  sample_per_dataset: 20
  sample_strategy: head
  shuffle_seed: 42
  sample_concurrency: 1
  output_root: outputs/msearth_open_ended_batched_ler_reasoning_chain/0100_0120
  cleaning_version: v3.2.0
  batch_id_prefix: benchmarkallinone-msearth-open-ended-0100-0120
  save_sample_bundle: true
  git_cache_root: outputs/repo_cache
model:
  base_url: https://synai996.space/v1
  model: gpt-5.4
  reasoning_effort: high
  temperature: 0.1
  timeout_seconds: 180
  enabled: true
datasets:
- key: msearth_open_ended
  display_name: MSEarth Open Ended
  subject: 地球科学
  note: 分批运行区间 train[100:120]
  source_kind: huggingface
  source_locator: MSEarth/MSEarth_Open_Ended
  split: train[100:120]
  question_fields:
  - query
  answer_fields:
  - response
  image_fields:
  - image
  metadata_fields:
  - reasoning_chain
  - caption
  - title
  - classification_result
  - vqa_type
